{% extends 'blog_page/base.html' %}
{% load crispy_forms_tags %}

{% block body %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Displaying messages if any -->
                {% for message in messages %}
                    <div class="alert alert-info text-center">
                        <h4><strong>{{ message }}</strong></h4>
                    </div>
                {% endfor %}

                <!-- Profile card -->
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <!-- Profile image -->
                        <img class="rounded-circle mb-3" width="150" height="150" src="{{ user.image.image.url }}" alt="Profile Image">

                        <h2 class="text-secondary">{{ user }}</h2>
                        <h4 class="text-muted">{{ user.email }}</h4>

                        <hr>

                        <!-- Profile update form -->
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <fieldset class="form-group">
                                <legend class="h4 text-primary mb-4"><strong>Update Profile</strong></legend>
                                
                                <!-- Crispy forms for email and image update -->
                                {{ user_email_update|crispy }}
                                {{ image_update|crispy }}
                            </fieldset>

                            <!-- Submit button with added margin -->
                            <div class="form-group mt-4">
                                <button class="btn btn-primary btn-lg w-100" type="submit">Update</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
